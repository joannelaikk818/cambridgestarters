<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starters Spelling Fun</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F0F9FF;
            --text: #2F3E46;
            --error: #FF4D4D;
        }

        body {
            font-family: 'Chalkboard SE', 'Quicksand', 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            user-select: none;
        }

        button { font-family: inherit; touch-action: manipulation; }

        #status-bar {
            display: none;
            width: 100%;
            max-width: 600px;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .stat-box {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 0 #ddd;
            font-size: 1.3rem;
            font-weight: bold;
        }

        #menu-screen { padding: 40px 20px; text-align: center; max-width: 800px; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .cat-btn {
            padding: 20px 10px;
            border: none;
            border-radius: 20px;
            background: white;
            box-shadow: 0 6px 0 #ddd;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .cat-btn:hover { background: var(--accent); transform: translateY(-2px); }
        .cat-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #ddd; }

        #game-screen {
            display: none;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding-top: 20px;
        }

        .emoji-display {
            font-size: 100px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .slots { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }

        .slot {
            width: 45px;
            height: 55px;
            border-bottom: 5px solid #cbd5e1;
            font-size: 34px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
        }

        .letters-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 30px; }

        .letter-tile {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #ddd;
            transition: all 0.1s;
        }

        .wrong { border: 3px solid var(--error) !important; animation: shake 0.3s ease-in-out; color: var(--error); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .hidden-tile { opacity: 0; pointer-events: none; transform: scale(0.5); }

        #over-screen { display: none; text-align: center; padding: 50px; }
        .big-score { font-size: 5rem; color: var(--primary); margin: 20px 0; text-shadow: 3px 3px #fff; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-box">⏳ <span id="timer">02:00</span></div>
        <div class="stat-box">⭐ Score: <span id="score">0</span></div>
    </div>

    <div id="menu-screen">
        <h1 style="color: var(--primary); font-size: 2.5rem;">Spelling Starters 🐾</h1>
        <div class="category-grid" id="category-grid"></div>
    </div>

    <div id="game-screen">
        <button class="cat-btn" onclick="quitGame()" style="background: var(--error); color: white; padding: 10px 20px; font-size: 0.9rem; margin-bottom: 15px; box-shadow: 0 4px 0 #b33;">
            Quit 🚩
        </button>
        <div class="emoji-display" id="emoji-hint"></div>
        <div class="slots" id="slots"></div>
        <div class="letters-pool" id="pool"></div>
    </div>

    <div id="over-screen">
        <h1>Game Summary 🏁</h1>
        <div class="big-score" id="final-score">0</div>
        <button class="cat-btn" onclick="location.reload()" style="background: var(--secondary); color: white; padding: 15px 30px;">Play Again</button>
    </div>

    <script>
        const vocabulary = {
            "Animals": { words: "Dog,Cat,Bird,Fish,Frog,Hippo,Lion,Tiger,Snake,Duck,Bear,Bee,Cow,Goat,Horse,Mouse,Sheep,Spider,Whale", emoji: { "Dog":"🐶","Cat":"🐱","Bird":"🐦","Fish":"🐟","Frog":"🐸","Hippo":"🦛","Lion":"🦁","Tiger":"🐯","Snake":"🐍","Duck":"🦆","Bear":"🐻","Bee":"🐝","Cow":"🐮","Goat":"🐐","Horse":"🐴","Mouse":"🐭","Sheep":"🐑","Spider":"🕷️","Whale":"🐳"} },
            "Body": { words: "Arm,Ear,Eye,Face,Foot,Hair,Hand,Head,Leg,Mouth,Nose,Tail", emoji: {"Arm":"💪","Ear":"👂","Eye":"👁️","Face":"😊","Foot":"🦶","Hair":"💇","Hand":"✋","Head":"👤","Leg":"🦵","Mouth":"👄","Nose":"👃","Tail":"🐒"} },
            "Clothes": { words: "Bag,Coat,Dress,Hat,Jacket,Jeans,Shoes,Skirt,Socks,Watch", emoji: {"Bag":"👜","Coat":"🧥","Dress":"👗","Hat":"👒","Jacket":"🧥","Jeans":"👖","Shoes":"👞","Skirt":"👗","Socks":"🧦","Watch":"⌚"} },
            "Food": { words: "Apple,Banana,Bread,Burger,Cake,Candy,Carrot,Cheese,Egg,Grape,Juice,Lemon,Milk,Pear,Pizza,Potato,Rice,Soup,Tomato,Water", emoji: {"Apple":"🍎","Banana":"🍌","Bread":"🍞","Burger":"🍔","Cake":"🍰","Candy":"🍬","Carrot":"🥕","Cheese":"🧀","Egg":"🥚","Grape":"🍇","Juice":"🧃","Lemon":"🍋","Milk":"輕鬆","Pear":"🍐","Pizza":"🍕","Potato":"🥔","Rice":"🍚","Soup":"🥣","Tomato":"🍅","Water":"💧"} },
            "Nature": { words: "Beach,Cloud,Farm,Flower,Leaf,Moon,Mountain,Rain,River,Sea,Sky,Star,Sun,Tree", emoji: {"Beach":"🏖️","Cloud":"☁️","Farm":"🚜","Flower":"🌸","Leaf":"🍃","Moon":"🌙","Mountain":"⛰️","Rain":"🌧️","River":"🏞️","Sea":"🌊","Sky":"🌌","Star":"⭐","Sun":"☀️","Tree":"🌳"} },
            "Transport": { words: "Bike,Boat,Bus,Car,Plane,Train,Truck", emoji: {"Bike":"🚲","Boat":"⛵","Bus":"🚌","Car":"🚗","Plane":"✈️","Train":"🚆","Truck":"🚚"} },
            "School": { words: "Book,Class,Desk,Eraser,Pen,Pencil,Picture,Ruler", emoji: {"Book":"📖","Class":"🏫","Desk":"🪑","Eraser":"🧼","Pen":"🖊️","Pencil":"✏️","Picture":"🖼️","Ruler":"📏"} }
        };

        let score = 0, timeLeft = 120, timerInterval;
        let currentCategory = "", currentWord = "", charIndex = 0;
        let recentWords = [], mistakes = 0, isWaiting = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function setup() {
            const grid = document.getElementById('category-grid');
            Object.keys(vocabulary).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = cat;
                btn.onclick = () => startGame(cat);
                grid.appendChild(btn);
            });
        }

        function startGame(cat) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentCategory = cat;
            score = 0; timeLeft = 120;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('status-bar').style.display = 'flex';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft <= 0) endGame();
            }, 1000);
            nextWord();
        }

        function nextWord() {
            isWaiting = false;
            mistakes = 0;
            const catData = vocabulary[currentCategory];
            const words = catData.words.split(',');
            let available = words.filter(w => !recentWords.includes(w.trim().toUpperCase()));
            if (available.length === 0) { recentWords = []; available = words; }

            currentWord = available[Math.floor(Math.random() * available.length)].trim().toUpperCase();
            recentWords.push(currentWord);
            if (recentWords.length > 5) recentWords.shift();

            charIndex = 0;
            document.getElementById('emoji-hint').innerText = catData.emoji[currentWord[0] + currentWord.slice(1).toLowerCase()] || "❓";
            
            const slots = document.getElementById('slots');
            slots.innerHTML = '';
            for(let i=0; i<currentWord.length; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.id = 's-' + i;
                slots.appendChild(s);
            }

            const pool = document.getElementById('pool');
            pool.innerHTML = '';
            let letters = currentWord.split('').sort(() => Math.random() - 0.5);
            letters.forEach((l, idx) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.innerText = l;
                tile.onclick = () => handleInput(l, tile);
                pool.appendChild(tile);
            });
        }

        function handleInput(l, tile) {
            if (isWaiting) return;

            if (l === currentWord[charIndex]) {
                document.getElementById('s-' + charIndex).innerText = l;
                tile.classList.add('hidden-tile');
                charIndex++;
                if (charIndex === currentWord.length) {
                    score += 5;
                    finishWord();
                }
            } else {
                mistakes++;
                score = Math.max(0, score - 1);
                document.getElementById('score').innerText = score;
                tile.classList.add('wrong');
                setTimeout(() => tile.classList.remove('wrong'), 400);

                if (mistakes >= 5) {
                    // Show correct answer in red
                    for (let i = charIndex; i < currentWord.length; i++) {
                        const s = document.getElementById('s-' + i);
                        s.innerText = currentWord[i];
                        s.style.color = "var(--error)";
                    }
                    finishWord();
                }
            }
            document.getElementById('score').innerText = score;
        }

        function finishWord() {
            isWaiting = true;
            // 1. Only pronounce the full word, not individual letters
            const msg = new SpeechSynthesisUtterance(currentWord);
            msg.lang = 'en-US';
            
            // 2. Fix skipping: Wait for speech to finish BEFORE calling nextWord
            msg.onend = () => {
                setTimeout(nextWord, 500); 
            };
            
            // If speech synthesis fails/not supported, fallback to move next
            if (!window.speechSynthesis) {
                setTimeout(nextWord, 1000);
            } else {
                window.speechSynthesis.speak(msg);
            }
        }

        function quitGame() { endGame(); }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('over-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        setup();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starters Spelling Fun</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F0F9FF;
            --text: #2F3E46;
            --error: #FF4D4D;
        }

        body {
            font-family: 'Chalkboard SE', 'Quicksand', 'Comic Sans MS', cursive, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            user-select: none;
        }

        button { font-family: inherit; touch-action: manipulation; }

        #status-bar {
            display: none;
            width: 100%;
            max-width: 600px;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .stat-box {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 0 #ddd;
            font-size: 1.3rem;
            font-weight: bold;
        }

        #menu-screen { padding: 40px 20px; text-align: center; max-width: 800px; }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .cat-btn {
            padding: 20px 10px;
            border: none;
            border-radius: 20px;
            background: white;
            box-shadow: 0 6px 0 #ddd;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .cat-btn:hover { background: var(--accent); transform: translateY(-2px); }
        .cat-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #ddd; }

        #game-screen {
            display: none;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding-top: 20px;
        }

        .emoji-display {
            font-size: 100px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .slots { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }

        .slot {
            width: 45px;
            height: 55px;
            border-bottom: 5px solid #cbd5e1;
            font-size: 34px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
        }

        .letters-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 30px; }

        .letter-tile {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #ddd;
            transition: all 0.1s;
        }

        .wrong { border: 3px solid var(--error) !important; animation: shake 0.3s ease-in-out; color: var(--error); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .hidden-tile { opacity: 0; pointer-events: none; transform: scale(0.5); }

        #over-screen { display: none; text-align: center; padding: 50px; }
        .big-score { font-size: 5rem; color: var(--primary); margin: 20px 0; text-shadow: 3px 3px #fff; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-box">⏳ <span id="timer">02:00</span></div>
        <div class="stat-box">⭐ Score: <span id="score">0</span></div>
    </div>

    <div id="menu-screen">
        <h1 style="color: var(--primary); font-size: 2.5rem;">Spelling Starters 🐾</h1>
     <p>You have 2 minutes! Choose a topic:</p>
        <div class="category-grid" id="category-grid"></div>
    </div>

    <div id="game-screen">
        <button class="cat-btn" onclick="quitGame()" style="background: var(--error); color: white; padding: 10px 20px; font-size: 0.9rem; margin-bottom: 15px; box-shadow: 0 4px 0 #b33;">
            Quit 🚩
        </button>
        <div class="emoji-display" id="emoji-hint"></div>
        <div class="slots" id="slots"></div>
        <div class="letters-pool" id="pool"></div>
    </div>

    <div id="over-screen">
        <h1>Game Summary 🏁</h1>
        <div class="big-score" id="final-score">0</div>
        <button class="cat-btn" onclick="location.reload()" style="background: var(--secondary); color: white; padding: 15px 30px;">Play Again</button>
    </div>

    <script>
        const vocabulary = {
            "Color": { 
                words: "black,blue,brown,color,green,grey,gray,orange,pink,purple,red,white,yellow", 
                emoji: {"black":"⬛","blue":"🟦","brown":"🟫","color":"🎨","green":"🟩","grey":"🩶","gray":"🩶","orange":"🟧","pink":"🌸","purple":"🟪","red":"🟥","white":"⬜","yellow":"🟨"} 
            },
            "Animal": { 
                words: "animal,bear,bee,bird,cat,chicken,cow,crocodile,dog,donkey,duck,elephant,fish,frog,giraffe,goat,hippo,horse,jellyfish,lizard,mouse,mice,monkey,pet,polar bear,sheep,snake,spider,tail,tiger,zebra,zoo", 
                emoji: {"animal":"🐾","bear":"🐻","bee":"🐝","bird":"🐦","cat":"🐱","chicken":"🐔","cow":"🐮","crocodile":"🐊","dog":"🐶","donkey":"🫏","duck":"🦆","elephant":"🐘","fish":"🐟","frog":"🐸","giraffe":"🦒","goat":"🐐","hippo":"🦛","horse":"🐴","jellyfish":"🪼","lizard":"🦎","mouse":"🐭","mice":"🐭","monkey":"🐒","pet":"🐕","polar bear":"🐻‍❄️","sheep":"🐑","snake":"🐍","spider":"🕷️","tail":"🐒","tiger":"🐯","zebra":"🦓","zoo":"🦁"} 
            },
            "Body": { 
                words: "arm,ear,eye,face,foot,hair,hand,head,leg,mouth,nose,tail", 
                emoji: {"arm":"💪","ear":"👂","eye":"👁️","face":"😊","foot":"🦶","hair":"💇","hand":"✋","head":"👤","leg":"🦵","mouth":"👄","nose":"👃","tail":"🐕"} 
            },
            "Clothes": { 
                words: "bag,coat,dress,hat,jacket,jeans,shoes,skirt,socks,watch", 
                emoji: {"bag":"👜","coat":"🧥","dress":"👗","hat":"👒","jacket":"🧥","jeans":"👖","shoes":"👞","skirt":"👗","socks":"🧦","watch":"⌚"} 
            },
            "Food": { 
                words: "apple,banana,bread,burger,cake,candy,carrot,cheese,egg,grape,juice,lemon,milk,pear,pizza,potato,rice,soup,tomato,water", 
                emoji: {"apple":"🍎","banana":"🍌","bread":"🍞","burger":"🍔","cake":"🍰","candy":"🍬","carrot":"🥕","cheese":"🧀","egg":"🥚","grape":"🍇","juice":"🧃","lemon":"🍋","milk":"🥛","pear":"🍐","pizza":"🍕","potato":"🥔","rice":"🍚","soup":"🥣","tomato":"🍅","water":"💧"} 
            },
            "Nature": { 
                words: "beach,cloud,farm,flower,leaf,moon,mountain,rain,river,sea,sky,star,sun,tree", 
                emoji: {"beach":"🏖️","cloud":"☁️","farm":"🚜","flower":"🌸","leaf":"🍃","moon":"🌙","mountain":"⛰️","rain":"🌧️","river":"🏞️","sea":"🌊","sky":"🌌","star":"⭐","sun":"☀️","tree":"🌳"} 
            },
            "School": { 
                words: "board,book,bookcase,class,classroom,computer,crayon,cupboard,desk,door,keyboard,mouse,paper,pen,pencil,picture,playground,poster,rubber,eraser,ruler,school,teacher,wall,window", 
                emoji: {"board":"📋","book":"📖","bookcase":"📚","class":"🏫","classroom":"🏫","computer":"💻","crayon":"🖍️","cupboard":"🗄️","desk":"🪑","door":"🚪","keyboard":"⌨️","mouse":"🖱️","paper":"📄","pen":"🖊️","pencil":"✏️","picture":"🖼️","playground":"🛝","poster":"🖼️","rubber":"🧼","eraser":"🧼","ruler":"📏","school":"🏫","teacher":"👩‍🏫","wall":"🧱","window":"🪟"} 
            },
            "Transport": { 
                words: "bike,boat,bus,car,drive,helicopter,lorry,truck,plane,ship,train", 
                emoji: {"bike":"🚲","boat":"⛵","bus":"🚌","car":"🚗","drive":"🏎️","helicopter":"🚁","lorry":"🚛","truck":"🚚","plane":"✈️","ship":"🚢","train":"🚆"} 
            },
            "Family": { 
                words: "baby,boy,brother,child,children,classmate,cousin,father,dad,family,mother,mum,friend,girl,grandpa,grandfather,grandmother,grandma,kid,man,men,old,sister,woman,women,young", 
                emoji: {"baby":"👶","boy":"👦","brother":"👦","child":"🧒","children":"👭","classmate":"🧑‍🎓","cousin":"🧒","father":"👨","dad":"👨","family":"👨‍👩‍👧","mother":"👩","mum":"👩","friend":"🤝","girl":"👧","grandpa":"👴","grandfather":"👴","grandmother":"👵","grandma":"👵","kid":"🧒","man":"👨","men":"👨‍👨","old":"👴","sister":"👧","woman":"👩","women":"👩‍👩","young":"🧒"} 
            }
        };

        let score = 0, timeLeft = 120, timerInterval;
        let currentCategory = "", currentWord = "", charIndex = 0;
        let recentWords = [], mistakes = 0, isWaiting = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function setup() {
            const grid = document.getElementById('category-grid');
            Object.keys(vocabulary).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = cat;
                btn.onclick = () => startGame(cat);
                grid.appendChild(btn);
            });
        }

        function startGame(cat) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentCategory = cat;
            score = 0; timeLeft = 120;
            recentWords = []; // Reset history for new session
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('status-bar').style.display = 'flex';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft <= 0) endGame();
            }, 1000);
            nextWord();
        }

        function nextWord() {
            isWaiting = false;
            mistakes = 0;
            const catData = vocabulary[currentCategory];
            const words = catData.words.split(',').map(w => w.trim().toUpperCase());
            
            // 1. Logic to not repeat words within 10 questions
            let available = words.filter(w => !recentWords.includes(w));
            
            // If we run out of words or category is small, clear oldest history
            if (available.length === 0) { 
                recentWords = []; 
                available = words; 
            }

            currentWord = available[Math.floor(Math.random() * available.length)];
            
            // Manage history (keep last 10)
            recentWords.push(currentWord);
            if (recentWords.length > 10) recentWords.shift();

            charIndex = 0;
            // Handle multi-word emoji matching (e.g., polar bear)
            let emojiKey = currentWord.toLowerCase();
            document.getElementById('emoji-hint').innerText = catData.emoji[emojiKey] || "❓";
            
            const slots = document.getElementById('slots');
            slots.innerHTML = '';
            
            // Filter out spaces for the "slots" (e.g. for "polar bear")
            let displayChars = currentWord.replace(/\s/g, ''); 
            currentWordNoSpace = displayChars;

            for(let i=0; i < displayChars.length; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.id = 's-' + i;
                slots.appendChild(s);
            }

            const pool = document.getElementById('pool');
            pool.innerHTML = '';
            let letters = displayChars.split('').sort(() => Math.random() - 0.5);
            letters.forEach((l) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.innerText = l;
                tile.onclick = () => handleInput(l, tile);
                pool.appendChild(tile);
            });
        }

        function handleInput(l, tile) {
            if (isWaiting) return;

            if (l === currentWordNoSpace[charIndex]) {
                document.getElementById('s-' + charIndex).innerText = l;
                tile.classList.add('hidden-tile');
                charIndex++;
                if (charIndex === currentWordNoSpace.length) {
                    score += 5;
                    finishWord();
                }
            } else {
                mistakes++;
                score = Math.max(0, score - 1);
                document.getElementById('score').innerText = score;
                tile.classList.add('wrong');
                setTimeout(() => tile.classList.remove('wrong'), 400);

                if (mistakes >= 5) {
                    for (let i = charIndex; i < currentWordNoSpace.length; i++) {
                        const s = document.getElementById('s-' + i);
                        s.innerText = currentWordNoSpace[i];
                        s.style.color = "var(--error)";
                    }
                    finishWord();
                }
            }
            document.getElementById('score').innerText = score;
        }

        function finishWord() {
            isWaiting = true;
            const msg = new SpeechSynthesisUtterance(currentWord.toLowerCase());
            msg.lang = 'en-US';
            
            msg.onend = () => {
                setTimeout(nextWord, 500); 
            };
            
            if (!window.speechSynthesis) {
                setTimeout(nextWord, 1000);
            } else {
                window.speechSynthesis.speak(msg);
            }
        }

        function quitGame() { endGame(); }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('over-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        setup();
    </script>
</body>
</html>
